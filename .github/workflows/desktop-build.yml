name: Desktop Build (Fase 6)

# Disparo manual. Construye los instaladores nativos (Windows/macOS/Linux) del
# cliente Tauri y los publica como GitHub Release descargable.
# NOTA: sin firma de código todavía — Windows SmartScreen y macOS Gatekeeper
# van a advertir al instalar. Válido para demo/pruebas, no distribución masiva.
on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
          - platform: macos-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias nativas (solo Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri + publicar release (sin firmar)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: desktop-v__VERSION__
          releaseName: "El Compañero Desktop v__VERSION__"
          releaseBody: "Instaladores de escritorio (sin firmar — Windows SmartScreen / macOS Gatekeeper pueden advertir). Cliente Tauri que carga companion.wuju.dev."
          releaseDraft: false
          prerelease: true
